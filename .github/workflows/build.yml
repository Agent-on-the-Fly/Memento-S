name: Build Memento-S

# 触发条件：
#   - 推送版本 tag (v*)   → 全平台构建并发布 Release
#   - 手动触发            → 可选平台 + 可选是否发布
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Build target"
        required: true
        default: "linux"
        type: choice
        options:
          - windows
          - macos
          - linux
          - all
      publish_release:
        description: "Publish as GitHub Release"
        required: false
        default: "false"
        type: boolean

# ─── Jobs ──────────────────────────────────────────────────────────────────────

jobs:
  # ── 读取版本 + 决定哪些平台需要构建 ──────────────────────────────────────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version:     ${{ steps.meta.outputs.version }}
      run_windows: ${{ steps.meta.outputs.run_windows }}
      run_macos:   ${{ steps.meta.outputs.run_macos }}
      run_linux:   ${{ steps.meta.outputs.run_linux }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        name: Determine version and build matrix
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(python3 -c "
          import re, pathlib
          t = pathlib.Path('pyproject.toml').read_text()
          m = re.search(r'^version\s*=\s*\"([^\"]+)\"', t, re.MULTILINE)
          print(m.group(1) if m else '0.1.0')
          ")
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          TARGET="${{ github.event.inputs.target }}"
          IS_TAG=${{ startsWith(github.ref, 'refs/tags/v') }}

          if [[ "$IS_TAG" == "true" || "$TARGET" == "all" ]]; then
            WIN=true; MAC=true; LNX=true
          elif [[ "$TARGET" == "windows" ]]; then
            WIN=true;  MAC=false; LNX=false
          elif [[ "$TARGET" == "macos" ]]; then
            WIN=false; MAC=true;  LNX=false
          else
            WIN=false; MAC=false; LNX=true
          fi

          echo "run_windows=$WIN" >> "$GITHUB_OUTPUT"
          echo "run_macos=$MAC"   >> "$GITHUB_OUTPUT"
          echo "run_linux=$LNX"   >> "$GITHUB_OUTPUT"

  # ── Windows 构建（flet build → .zip）────────────────────────────────────────
  # 图标：自动读取 assets/icon.png / assets/icon.ico
  # 产物：dist/flet_build/ 下的 exe + dll → 打包为 .zip
  build-windows:
    name: Build / Windows (.zip)
    needs: prepare
    if: needs.prepare.outputs.run_windows == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install flet
        run: pip install "flet>=0.25.0"

      - name: flet build windows
        run: |
          python build_scripts/build_flet_native.py windows `
            --build-version ${{ needs.prepare.outputs.version }} `
            -o dist/flet_build

      - name: Package as ZIP
        id: pkg
        shell: pwsh
        run: |
          $zip = "memento-s-${{ needs.prepare.outputs.version }}-windows.zip"
          Compress-Archive -Path "dist\flet_build\*" -DestinationPath $zip
          echo "path=$zip" >> $env:GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: memento-s-${{ needs.prepare.outputs.version }}-windows
          path: ${{ steps.pkg.outputs.path }}
          retention-days: 14

  # ── macOS 构建（flet build → .dmg）─────────────────────────────────────────
  # 图标：自动读取 assets/icon.png / assets/icon.icns
  # 产物：.app bundle → 用 hdiutil 封装为 .dmg
  # 同时构建 Intel (x86_64) 和 Apple Silicon (arm64) 两个版本
  build-macos:
    name: Build / macOS ${{ matrix.arch }} (.dmg)
    needs: prepare
    if: needs.prepare.outputs.run_macos == 'true'
    strategy:
      matrix:
        include:
          - runner: macos-13      # Intel x86_64
            arch: x86_64
          - runner: macos-latest  # Apple Silicon arm64
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # CocoaPods：macOS Flutter 构建必需
      - name: Install CocoaPods
        run: brew install cocoapods

      - name: Install flet
        run: pip install "flet>=0.25.0"

      - name: flet build macos
        run: |
          python build_scripts/build_flet_native.py macos \
            --build-version ${{ needs.prepare.outputs.version }} \
            -o dist/flet_build

      - name: Package as DMG
        id: pkg
        run: |
          APP=$(find dist/flet_build -name "*.app" -maxdepth 1 | head -1)
          DMG="memento-s-${{ needs.prepare.outputs.version }}-macos-${{ matrix.arch }}.dmg"
          hdiutil create -volname "Memento-S" -srcfolder "$APP" -ov -format UDZO "$DMG"
          echo "path=$DMG" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: memento-s-${{ needs.prepare.outputs.version }}-macos-${{ matrix.arch }}
          path: ${{ steps.pkg.outputs.path }}
          retention-days: 14

  # ── Linux 构建（flet build → .tar.gz）───────────────────────────────────────
  # 图标：自动读取 assets/icon.png
  # 产物：可执行文件目录 → 打包为 .tar.gz
  build-linux:
    name: Build / Linux (.tar.gz)
    needs: prepare
    if: needs.prepare.outputs.run_linux == 'true'
    runs-on: ubuntu-22.04   # glibc 2.35，平衡兼容性与现代性
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Flutter on Linux 需要的系统库
      - name: Install Flutter system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ninja-build clang cmake pkg-config \
            libgtk-3-dev libblkid-dev liblzma-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install flet
        run: pip install "flet>=0.25.0"

      - name: flet build linux
        run: |
          python build_scripts/build_flet_native.py linux \
            --build-version ${{ needs.prepare.outputs.version }} \
            -o dist/flet_build

      - name: Package as tar.gz
        id: pkg
        run: |
          TARBALL="memento-s-${{ needs.prepare.outputs.version }}-linux.tar.gz"
          tar -czf "$TARBALL" -C dist/flet_build .
          echo "path=$TARBALL" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: memento-s-${{ needs.prepare.outputs.version }}-linux
          path: ${{ steps.pkg.outputs.path }}
          retention-days: 14

  # ── 发布 GitHub Release ─────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [prepare, build-windows, build-macos, build-linux]
    if: |
      always() &&
      (startsWith(github.ref, 'refs/tags/v') ||
       github.event.inputs.publish_release == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Memento-S v${{ needs.prepare.outputs.version }}"
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.version, '-') }}
          files: artifacts/*
          body: |
            ## Memento-S v${{ needs.prepare.outputs.version }}

            ### Downloads

            | Platform | 文件 | 说明 |
            |----------|------|------|
            | Windows  | `.zip` | 解压后运行 `memento-s.exe` |
            | macOS (Intel)  | `.dmg` | 拖入 Applications 文件夹 |
            | macOS (Apple Silicon) | `.dmg` | 拖入 Applications 文件夹 |
            | Linux    | `.tar.gz` | 解压后运行 `memento-s` |

            ### Changelog
            _Add your release notes here._
